output_dir = "/workspace/laguna-meta-control/B_anti_inertia"
clean_output_dir = true
max_steps = 100
seq_len = 4096

[wandb]
project = "laguna-meta-control"
name = "B_anti_inertia"
offline = false

[model]
name = "poolside/Laguna-XS.2"

[deployment]
type = "single_node"
gpus_per_node = 8
num_infer_gpus = 4
num_train_gpus = 4

[weight_broadcast]
type = "filesystem"

[ckpt]
interval = 10

[trainer]
max_steps = 100
enable_router_replay = false

[trainer.model]
name = "poolside/Laguna-XS.2"
trust_remote_code = true
seq_len = 4096
impl = "auto"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"
ep = 1
cp = 1
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.model.ac_offloading]
pin_memory = true
max_inflight_activations = 1

[trainer.model.lora]
rank = 16
alpha = 32.0
dropout = 0.0

[trainer.optim]
type = "adamw"
lr = 1e-6
weight_decay = 0.0

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 8
group_size = 8
tasks_per_minute = 4
max_inflight_rollouts = 8
max_off_policy_steps = 1

[orchestrator.advantage]
type = "default"

[orchestrator.buffer]
online_difficulty_filtering = true

[orchestrator.model]
name = "poolside/Laguna-XS.2"
trust_remote_code = true

[orchestrator.model.lora]
rank = 16
alpha = 32.0

[orchestrator.client]
base_url = ["http://localhost:8000/v1"]
api_key_var = "VLLM_API_KEY"
skip_model_check = false
timeout = 1200

[orchestrator.train]
num_workers = 4
max_retries = 0

[orchestrator.train.sampling]
max_completion_tokens = 2048
temperature = 1.0

[[orchestrator.train.env]]
id = "meta-control"
name = "meta_control"
args = { harness = { gated_progress_weight = 0.25, stop_success_reward = 0.20, stop_run_past_complete_penalty = 0.20, stop_early_penalty = 0.20, stop_very_early_penalty = 0.25, repeat_action_unit_penalty = 0.03, repeat_action_cap = 0.12, dominant_action_penalty = 0.05, malformed_tool_unit_penalty = 0.05, malformed_tool_cap = 0.10, turn_cost_unit = 0.01, turn_cost_cap = 0.02, success_turn_cost_cap = 0.01 } }
max_retries = 0

[orchestrator.wandb.log_extras]
samples = true
distributions = true
interval = 1
sample_ratio = 1.0

[inference]
enable_lora = true
enable_prefix_caching = true
gpu_memory_utilization = 0.9
api_server_count = 1

[inference.server]
host = "0.0.0.0"
port = 8000

[inference.model]
name = "poolside/Laguna-XS.2"
trust_remote_code = true
dtype = "bfloat16"
max_model_len = 65536
enforce_eager = true

[inference.parallel]
tp = 4
dp = 1

[inference.vllm_extra]
renderer = "laguna-xs.2"
enable_thinking = false
