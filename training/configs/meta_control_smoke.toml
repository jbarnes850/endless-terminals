output_dir = "/tmp/laguna-meta-control-smoke"
clean_output_dir = true
max_steps = 1
seq_len = 8192
max_async_level = 1

[wandb]
project = "laguna-meta-control"
name = "meta-control-smoke"
offline = false
shared = true

[model]
name = "poolside/Laguna-XS.2"

[deployment]
type = "single_node"
gpus_per_node = 4
num_infer_gpus = 2
num_train_gpus = 2

[weight_broadcast]
type = "filesystem"

[trainer]
max_steps = 1
enable_router_replay = false

[trainer.model]
name = "poolside/Laguna-XS.2"
trust_remote_code = true
seq_len = 8192
impl = "auto"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"
tp = 2
ep = 1
cp = 1

[trainer.optim]
type = "adamw"
lr = 1e-6
weight_decay = 0.0

[trainer.loss]
type = "default"
teacher_tau = 0.0

[orchestrator]
batch_size = 4
rollouts_per_example = 4
max_concurrent = 4
max_inflight_rollouts = 4
max_off_policy_steps = 1
max_async_level = 1
use_token_client = false

[orchestrator.buffer]
online_difficulty_filtering = true

[orchestrator.model]
name = "poolside/Laguna-XS.2"
trust_remote_code = true

[orchestrator.client]
base_url = ["http://localhost:8000/v1"]
api_key_var = "VLLM_API_KEY"
skip_model_check = false
timeout = 1200

[orchestrator.sampling]
max_tokens = 4096
temperature = 1.0

[[orchestrator.env]]
id = "meta-control"
name = "meta_control"
args = { harness = { gated_progress_weight = 0.30, stop_success_reward = 0.15, stop_run_past_complete_penalty = 0.10, stop_early_penalty = 0.15, stop_very_early_penalty = 0.20, repeat_action_unit_penalty = 0.02, repeat_action_cap = 0.05, dominant_action_penalty = 0.03, malformed_tool_unit_penalty = 0.05, malformed_tool_cap = 0.10, turn_cost_unit = 0.005, turn_cost_cap = 0.02, success_turn_cost_cap = 0.01 } }
max_retries = 0

[orchestrator.wandb]
project = "laguna-meta-control"
name = "meta-control-smoke-orchestrator"
offline = false

[orchestrator.wandb.log_extras]
samples = true
distributions = true
interval = 1
sample_ratio = 1.0

[inference]
enable_lora = true
max_lora_rank = 64
enable_prefix_caching = true
gpu_memory_utilization = 0.9
api_server_count = 1

[inference.server]
host = "0.0.0.0"
port = 8000

[inference.model]
name = "poolside/Laguna-XS.2"
trust_remote_code = true
max_model_len = 258048
enforce_eager = true

[inference.parallel]
tp = 2
dp = 1

[inference.vllm_extra]
renderer = "laguna-xs.2"
enable_thinking = false
